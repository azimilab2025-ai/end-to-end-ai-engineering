name: Project 01 CI

on:
  push:
    paths:
      - "projects/01-ai-product-engineering/ai-powered-supply-chain-optimization/**"
      - ".github/workflows/project-01-ci.yml"
  pull_request:
    paths:
      - "projects/01-ai-product-engineering/ai-powered-supply-chain-optimization/**"
      - ".github/workflows/project-01-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: project-01-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_DIR: projects/01-ai-product-engineering/ai-powered-supply-chain-optimization
  COMPOSE_PROJECT_NAME: project-01-ci

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ env.PROJECT_DIR }}/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  docker-runtime:
    name: Docker runtime validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: python-tests

    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate Compose configuration
        run: docker compose -p "$COMPOSE_PROJECT_NAME" config --quiet

      - name: Build and start application
        run: docker compose -p "$COMPOSE_PROJECT_NAME" up -d --build

      - name: Wait for healthy container
        shell: bash
        run: |
          set -euo pipefail

          CID="$(docker compose -p "$COMPOSE_PROJECT_NAME" ps -q api)"

          if [ -z "$CID" ]; then
            echo "API container was not created."
            exit 1
          fi

          for attempt in $(seq 1 60); do
            STATUS="$(
              docker inspect \
                --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' \
                "$CID"
            )"

            echo "attempt=$attempt status=$STATUS"

            if [ "$STATUS" = "healthy" ]; then
              exit 0
            fi

            if [ "$STATUS" = "unhealthy" ] ||
               [ "$STATUS" = "exited" ] ||
               [ "$STATUS" = "dead" ]; then
              docker compose -p "$COMPOSE_PROJECT_NAME" logs \
                --no-color --tail=150
              exit 1
            fi

            sleep 2
          done

          echo "Container did not become healthy in time."
          docker compose -p "$COMPOSE_PROJECT_NAME" logs \
            --no-color --tail=150
          exit 1

      - name: Validate runtime user
        shell: bash
        run: |
          set -euo pipefail

          USER_ID="$(
            docker compose -p "$COMPOSE_PROJECT_NAME" exec -T api \
              id -u | tr -d '\r'
          )"

          echo "runtime_uid=$USER_ID"

          if [ "$USER_ID" = "0" ]; then
            echo "Container must not run as root."
            exit 1
          fi

      - name: Validate health response
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --silent \
            http://127.0.0.1:8011/health \
            > /tmp/project-01-health.json

          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path("/tmp/project-01-health.json").read_text(
                  encoding="utf-8"
              )
          )

          assert payload["status"] == "healthy", payload
          assert payload["environment"] == "production", payload

          print(json.dumps(payload, indent=2))
          PY

      - name: Validate root endpoint
        run: |
          curl --fail --silent \
            http://127.0.0.1:8011/ \
            | python -m json.tool

      - name: Run tests inside container
        run: |
          docker compose -p "$COMPOSE_PROJECT_NAME" exec -T api \
            python -m pytest -q

      - name: Show container status
        if: always()
        run: docker compose -p "$COMPOSE_PROJECT_NAME" ps -a

      - name: Show logs after failure
        if: failure()
        run: |
          docker compose -p "$COMPOSE_PROJECT_NAME" logs \
            --no-color --tail=200

      - name: Remove CI containers and volume
        if: always()
        run: |
          docker compose -p "$COMPOSE_PROJECT_NAME" down \
            --volumes \
            --remove-orphans
